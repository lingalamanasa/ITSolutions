<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Stackly IT Solutions</title>
    <meta name="description" content="The page you are looking for could not be found. Return to Stackly IT Solutions homepage.">

    <link rel="stylesheet" href="404style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="error-container">

    <div class="error-content">

        <!-- Animated SVG Illustration -->
        <div class="error-illustration">
            <svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg" class="error-svg">
                <defs>
                    <linearGradient id="errGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#19a7ff" />
                        <stop offset="100%" stop-color="#0055ff" />
                    </linearGradient>
                </defs>
                <!-- Broken Monitor -->
                <g transform="translate(80, 20)">
                    <rect x="0" y="0" width="140" height="100" rx="10" fill="#1b2b4b" />
                    <rect x="6" y="6" width="128" height="80" rx="6" fill="#0f172a" />
                    <!-- Error X -->
                    <circle cx="70" cy="46" r="25" fill="none" stroke="#ff4f79" stroke-width="3" opacity="0.8" />
                    <line x1="57" y1="33" x2="83" y2="59" stroke="#ff4f79" stroke-width="3" stroke-linecap="round" />
                    <line x1="83" y1="33" x2="57" y2="59" stroke="#ff4f79" stroke-width="3" stroke-linecap="round" />
                    <!-- Stand -->
                    <rect x="55" y="100" width="30" height="12" rx="2" fill="#1b2b4b" />
                    <rect x="40" y="110" width="60" height="5" rx="3" fill="#2a3f5f" />
                </g>
                <!-- Floating Question Marks -->
                <text x="40" y="50" font-family="'Poppins', sans-serif" font-size="24" fill="#19a7ff" opacity="0.3">?</text>
                <text x="240" y="70" font-family="'Poppins', sans-serif" font-size="18" fill="#19a7ff" opacity="0.2">?</text>
                <text x="20" y="120" font-family="'Poppins', sans-serif" font-size="16" fill="#4facfe" opacity="0.25">?</text>
                <text x="260" y="140" font-family="'Poppins', sans-serif" font-size="20" fill="#0055ff" opacity="0.2">?</text>
                <!-- Decorative Dots -->
                <circle cx="30" cy="170" r="4" fill="#19a7ff" opacity="0.15" />
                <circle cx="270" cy="30" r="6" fill="#4facfe" opacity="0.15" />
                <circle cx="250" cy="170" r="5" fill="#0055ff" opacity="0.15" />
            </svg>
        </div>

        <h1>404</h1>

        <h2>Oops! Page Not Found</h2>

        <p>
            The page you are looking for might have been removed,
            renamed, or is temporarily unavailable.
        </p>

        <a href="index.html" class="home-btn">
            <i class="fa-solid fa-house"></i>
            Back To Home
        </a>

    </div>

</div>

</body>
</html>
